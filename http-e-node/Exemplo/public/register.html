<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Page</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    "
  >
  <nav style="position: absolute; top: 20px; left: 20px;">
    <a href="./login.html" style="text-decoration: none; color: #00796B;">Voltar ao Login</a>
  </nav>  
    <form
      action="/register"
      method="post"
      style="
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 300px;
      "
    >
      <h2 style="text-align: center; margin-bottom: 20px">Register</h2>

      <label for="user" style="display: block; margin-bottom: 5px">
        Username
      </label>
      <input
        type="text"
        id="user"
        name="user"
        required
        style="
          width: 100%;
          padding: 8px;
          margin-bottom: 15px;
          border: 1px solid #ccc;
          border-radius: 5px;
        "
      />

      <label for="email" style="display: block; margin-bottom: 5px">
        Email
      </label>
      <input
        type="email"
        id="email"
        name="email"
        required
        style="
          width: 100%;
          padding: 8px;
          margin-bottom: 15px;
          border: 1px solid #ccc;
          border-radius: 5px;
        "
      />

      <label for="password" style="display: block; margin-bottom: 5px">
        Password
      </label>
      <input
        type="password"
        id="password"
        name="password"
        required
        style="
          width: 100%;
          padding: 8px;
          margin-bottom: 20px;
          border: 1px solid #ccc;
          border-radius: 5px;
        "
      />

      <button
        type="submit"
        style="
          width: 100%;
          padding: 10px;
          background-color: #4caf50;
          color: white;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        Register
      </button>
    </form>
  </body>
</html>
